---
- name: Template systemd unit for capstone compose stack
  template:
    src: capstone.service.j2
    dest: /etc/systemd/system/capstone.service
    mode: '0644'
  notify: Restart capstone service

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and start capstone service
  systemd:
    name: capstone
    enabled: yes
    state: started
