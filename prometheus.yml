global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'e-commerce-monitoring'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:3002']
    metrics_path: '/metrics'
    scrape_interval: 15s
